images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

cpuType:
  aarch64: "cortex-a72"

cpus: 2
memory: "4GiB"
disk: "20GiB"

mounts:
  - location: "~"
    writable: true
  - location: "/tmp/lima"
    writable: true

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive

      # Force HTTPS for apt to avoid HTTP interception by captive portals/routers
      sed -i 's|http://ports.ubuntu.com|https://ports.ubuntu.com|g' /etc/apt/sources.list.d/*.sources 2>/dev/null || \
      sed -i 's|http://ports.ubuntu.com|https://ports.ubuntu.com|g' /etc/apt/sources.list 2>/dev/null || true

      # Detect the non-root Lima user (UID 1000+ or fallback)
      LIMA_USER=$(id -un 1000 2>/dev/null || getent passwd 1000 | cut -d: -f1 || echo "")

      # Docker
      if ! command -v docker &>/dev/null; then
        curl -fsSL https://get.docker.com | sh
      fi

      # Ensure Lima user is in docker group (idempotent)
      if [ -n "${LIMA_USER}" ]; then
        usermod -aG docker "${LIMA_USER}"
        echo "[wifi-lab] Added ${LIMA_USER} to docker group"
      fi

      # Docker Compose plugin
      if ! docker compose version &>/dev/null 2>&1; then
        apt-get update -qq
        apt-get install -y -qq docker-compose-plugin
      fi

      # Wireless tools + Python venv support
      apt-get update -qq
      apt-get install -y -qq iw wireless-tools python3-venv python3-pip

      # mac80211_hwsim kernel module
      EXTRA_PKG="linux-modules-extra-$(uname -r)"
      if ! modinfo mac80211_hwsim &>/dev/null 2>&1; then
        apt-get install -y -qq "${EXTRA_PKG}" || echo "WARNING: Could not install ${EXTRA_PKG}"
      fi

      if modinfo mac80211_hwsim &>/dev/null 2>&1; then
        echo "[wifi-lab] mac80211_hwsim available"
      else
        echo "[wifi-lab] WARNING: mac80211_hwsim not found"
      fi
