# hostapd configuration — WPA3-SAE + WPA2-PSK transition mode
# Used for Dragonblood downgrade attack research

interface=wlan0
driver=nl80211
ctrl_interface=/var/run/hostapd
ssid=DragonbloodLab
hw_mode=g
channel=6

# Transition mode: both SAE and WPA2-PSK
wpa=2
wpa_key_mgmt=SAE WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=dr4gonfly

# PMF optional in transition mode
ieee80211w=1

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
