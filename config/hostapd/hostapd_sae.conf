# hostapd configuration — WPA3-SAE only
# Used with vulnerable hostap_2_4 for Dragonblood timing side-channel research

interface=wlan0
driver=nl80211
ctrl_interface=/var/run/hostapd
ssid=DragonbloodLab
hw_mode=g
channel=6

# WPA3-SAE authentication
wpa=2
wpa_key_mgmt=SAE
rsn_pairwise=CCMP
wpa_passphrase=dr4gonfly

# Protected Management Frames (required for SAE)
ieee80211w=2

# Logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
